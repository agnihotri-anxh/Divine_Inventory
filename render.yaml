services:
  - type: web
    name: divine-hindu-api
    runtime: python
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn index:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false        # you paste the value in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
